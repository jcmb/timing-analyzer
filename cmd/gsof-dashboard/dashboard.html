<!DOCTYPE html>
<html lang="en" data-gsof-build="__GSOF_DASHBOARD_VERSION__">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Trimble GSOF · __GSOF_DASHBOARD_VERSION__</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
    }
    .build-banner {
      margin: 0 0 0.5rem;
      padding: 0;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .build-banner span { opacity: 0.85; font-weight: 500; color: var(--muted); }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .meta {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .pill {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: var(--mono);
    }
    .pill.ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
    .pill.bad { background: rgba(248, 81, 73, 0.15); color: var(--bad); }
    .pill.wait { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
    #status { font-size: 0.8rem; color: var(--muted); }
    a.doc-top-link {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
    }
    a.doc-top-link:hover { text-decoration: underline; }
    main { padding: 1rem 1.25rem 2rem; max-width: 1200px; margin: 0 auto; }
    #cards {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    article.card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-head {
      padding: 0.75rem 0.9rem 0.65rem;
      border-bottom: 1px solid var(--border);
    }
    .card-head-top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 0.45rem 0.65rem;
      margin-bottom: 0.35rem;
    }
    .card-head-top .card-copy-all {
      margin-left: auto;
    }
    .card-head-top h2.card-title { margin-bottom: 0; flex: 1; min-width: 0; }
    /* GSOF human-readable message name — always first / top of card */
    h2.card-title {
      margin: 0 0 0.45rem;
      padding: 0;
      font-size: 1.05rem;
      font-weight: 650;
      color: var(--text);
      line-height: 1.3;
    }
    .card-stats {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.65rem;
    }
    .card-stats .card-rate { color: var(--accent); margin-left: auto; }
    .card-stats .card-stale {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--warn);
      border: 1px solid var(--warn);
      padding: 0.08rem 0.3rem;
      border-radius: 4px;
    }
    .card-stats .card-stale[hidden] { display: none !important; }
    details.card-more {
      border-top: none;
    }
    details.card-more > summary.card-more-summary {
      cursor: pointer;
      list-style: none;
      user-select: none;
      padding: 0;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0.35rem;
    }
    details.card-more > summary.card-more-summary::-webkit-details-marker {
      display: none;
    }
    .card-more-chevron {
      flex: 0 0 1.35rem;
      width: 1.35rem;
      text-align: center;
      margin-top: 0.62rem;
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1;
      transition: transform 0.15s;
    }
    details.card-more[open] > summary.card-more-summary .card-more-chevron {
      transform: rotate(90deg);
    }
    .card-more-header-wrap {
      flex: 1;
      min-width: 0;
    }
    .card-body {
      padding: 0 0.85rem 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 0.55rem;
    }
    .card-body dl {
      margin: 0;
      display: grid;
      grid-template-columns: 22rem 1fr;
      gap: 0.35rem 0.75rem;
      align-items: start;
    }
    .card-body dl > dt,
    details.field-expand .field-nested > dt {
      color: var(--muted);
      word-break: break-word;
      min-width: 0;
    }
    .card-body dd {
      margin: 0;
      color: var(--text);
      font-family: var(--mono);
      word-break: break-word;
      white-space: pre-wrap;
      text-align: left;
      font-variant-numeric: tabular-nums;
    }
    .field-dd-inner {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      align-items: stretch;
      width: 100%;
    }
    /* Hex / binary value first, “Flag bit meanings” beside it; expanded grid uses full width below. */
    .field-flags-top {
      display: flex;
      flex-flow: row wrap;
      align-items: baseline;
      gap: 0.5rem 0.75rem;
      width: 100%;
    }
    .field-flags-top .field-value {
      flex: 0 0 auto;
      width: auto;
    }
    .field-flags-top > details.field-expand {
      flex: 1 1 auto;
      min-width: 0;
    }
    .field-flags-top > details.field-expand[open] {
      flex-basis: 100%;
    }
    .field-value {
      display: block;
      width: 100%;
      text-align: left;
      font-variant-numeric: tabular-nums;
    }
    details.field-expand {
      width: 100%;
      max-width: 100%;
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.45rem;
      background: rgba(0, 0, 0, 0.12);
    }
    details.field-expand > summary {
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--accent);
      list-style: none;
      user-select: none;
      font-family: var(--sans);
    }
    details.field-expand > summary::-webkit-details-marker { display: none; }
    details.field-expand > summary::before {
      content: "▸ ";
      display: inline-block;
      min-width: 1.15em;
      margin-right: 0.15em;
      font-size: 1.15rem;
      line-height: 1;
      vertical-align: -0.12em;
      color: var(--muted);
      font-family: var(--mono);
    }
    details.field-expand[open] > summary::before {
      content: "▾ ";
    }
    details.field-expand .field-nested {
      margin: 0.4rem 0 0;
      padding: 0.4rem 0 0;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 22rem 1fr;
      gap: 0.3rem 0.65rem;
      font-size: 0.8rem;
    }
    details.field-expand .field-nested.field-nested-flags {
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
    }
    .field-flag-bit-line {
      display: flex;
      flex-flow: row wrap;
      align-items: baseline;
      gap: 0.35rem 0.65rem;
    }
    .field-flag-bit-label {
      color: var(--muted);
      font-family: var(--sans);
      flex: 0 1 22rem;
      min-width: 0;
      word-break: break-word;
    }
    .field-flag-bit-value {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
      flex: 1 1 auto;
      min-width: 0;
      white-space: pre-wrap;
      text-align: left;
      font-variant-numeric: tabular-nums;
    }
    details.field-expand .field-nested dt { color: var(--muted); font-family: var(--sans); }
    details.field-expand .field-nested dd {
      font-size: 0.78rem;
      white-space: pre-wrap;
      text-align: left;
      font-variant-numeric: tabular-nums;
    }
    .doc-link-wrap {
      margin: 0.5rem 0 0;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }
    .doc-link {
      color: var(--accent);
      font-size: 0.8rem;
      text-decoration: none;
    }
    .doc-link:hover { text-decoration: underline; }
    button.card-copy-all,
    button.header-copy-all {
      flex-shrink: 0;
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.65);
      color: var(--muted);
      cursor: pointer;
      line-height: 1.2;
    }
    button.card-copy-all:hover,
    button.header-copy-all:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .sv-brief-view-toggle {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.25rem;
    }
    .sv-brief-view-toggle button {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.55);
      color: var(--muted);
      cursor: pointer;
      line-height: 1.2;
    }
    .sv-brief-view-toggle button[aria-pressed="true"] {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(61, 139, 253, 0.12);
    }
    .sv-brief-view-toggle button:hover {
      color: var(--text);
      border-color: var(--muted);
    }
    .sv-detailed-view-toggle {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.25rem;
    }
    .sv-detailed-view-toggle button {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.55);
      color: var(--muted);
      cursor: pointer;
      line-height: 1.2;
    }
    .sv-detailed-view-toggle button[aria-pressed="true"] {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(61, 139, 253, 0.12);
    }
    .sv-detailed-view-toggle button:hover {
      color: var(--text);
      border-color: var(--muted);
    }
    button.tangent-graph-open-btn,
    button.llh-graph-open-btn,
    button.dop-graph-open-btn,
    button.sigma-graph-open-btn,
    button.attitude-graph-open-btn {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.55);
      color: var(--muted);
      cursor: pointer;
      line-height: 1.2;
    }
    button.tangent-graph-open-btn:hover,
    button.llh-graph-open-btn:hover,
    button.dop-graph-open-btn:hover,
    button.sigma-graph-open-btn:hover,
    button.attitude-graph-open-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .sv-brief-root,
    .sv-detailed-root {
      margin: 0;
      padding: 0 0.85rem 0.75rem;
      border-top: 1px solid var(--border);
      padding-top: 0.55rem;
      font-size: 0.82rem;
      color: var(--text);
    }
    article.card.card--sv-brief .card-body > dl,
    article.card.card--sv-detailed .card-body > dl {
      display: none;
    }
    article.card.card--sv-brief .sv-brief-root,
    article.card.card--sv-detailed .sv-detailed-root {
      border-top: none;
      padding-top: 0.35rem;
    }
    .sv-brief-basic-table,
    .sv-brief-detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin: 0 0 0.65rem;
    }
    .sv-brief-basic-table th,
    .sv-brief-basic-table td,
    .sv-brief-detail-table th,
    .sv-brief-detail-table td {
      border: 1px solid var(--border);
      padding: 0.28rem 0.45rem;
      text-align: left;
      vertical-align: top;
    }
    .sv-brief-basic-table th,
    .sv-brief-detail-table th {
      background: rgba(0, 0, 0, 0.18);
      color: var(--muted);
      font-weight: 600;
      font-family: var(--sans);
    }
    .sv-brief-basic-table td.mono,
    .sv-brief-detail-table td.mono {
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }
    .sv-brief-detail-wide-wrap {
      overflow-x: auto;
      margin: 0 0 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .sv-brief-detail-wide-table {
      width: 100%;
      min-width: 36rem;
      table-layout: fixed;
      border-collapse: collapse;
      font-size: 0.78rem;
    }
    .sv-brief-detail-wide-table th,
    .sv-brief-detail-wide-table td {
      border: 1px solid var(--border);
      padding: 0.28rem 0.38rem;
      vertical-align: middle;
    }
    .sv-brief-detail-wide-table thead th {
      background: rgba(0, 0, 0, 0.2);
      color: var(--muted);
      font-weight: 650;
      font-family: var(--sans);
      text-align: center;
    }
    .sv-brief-detail-wide-table thead th.sv-brief-bit-col {
      font-family: var(--mono);
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--accent);
      width: 2.35rem;
    }
    .sv-brief-detail-wide-table tbody td {
      text-align: center;
    }
    .sv-brief-detail-wide-table col.sv-brief-prn-col {
      width: 2.35rem;
    }
    .sv-brief-detail-wide-table col.sv-brief-bit-colgroup {
      width: 2.35rem;
    }
    .sv-brief-detail-wide-table thead th.sv-brief-prn-col,
    .sv-brief-detail-wide-table tbody td.sv-brief-prn-col {
      white-space: nowrap;
      box-sizing: border-box;
      text-align: center;
      padding-left: 0.28rem;
      padding-right: 0.28rem;
      vertical-align: middle;
    }
    .sv-brief-detail-wide-table tbody td.sv-brief-prn-col {
      font-weight: 600;
    }
    .sv-brief-detail-wide-table tbody td.mono {
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }
    .sv-brief-legend {
      margin: 0.25rem 0 0;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.14);
      font-size: 0.78rem;
      color: var(--text);
    }
    .sv-brief-legend h4 {
      margin: 0 0 0.5rem;
      font-size: 0.82rem;
      font-weight: 650;
      color: var(--muted);
    }
    .sv-brief-legend h5 {
      margin: 0.75rem 0 0.35rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
    }
    .sv-brief-legend h5:first-of-type {
      margin-top: 0.15rem;
    }
    .sv-brief-legend p {
      margin: 0.25rem 0 0.15rem;
      line-height: 1.45;
      color: var(--text);
    }
    .sv-brief-legend p strong {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.76rem;
    }
    .sv-brief-legend-note {
      margin-top: 0.65rem !important;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted) !important;
      font-size: 0.74rem !important;
    }
    .sv-brief-sv-block {
      margin: 0 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .sv-brief-sv-block:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .sv-brief-sv-block h4 {
      margin: 0.65rem 0 0.35rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
    }
    .sv-brief-sv-block h4:first-of-type {
      margin-top: 0.25rem;
    }
    .sv-brief-prn {
      margin: 0 0 0.35rem;
      font-size: 0.88rem;
      font-weight: 650;
      color: var(--text);
    }
    .sv-brief-detail-meaning {
      color: var(--muted);
      font-family: var(--sans);
      max-width: 36rem;
    }
    #warnings {
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      background: rgba(248, 81, 73, 0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: none;
    }
    #warnings.visible { display: block; }
    #warnings h2 { margin: 0 0 0.5rem; font-size: 0.85rem; color: var(--warn); }
    #warnings pre {
      margin: 0;
      white-space: pre-wrap;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <p class="build-banner" title="Increment cmd/gsof-dashboard/version.go when you change this app">Build <strong>__GSOF_DASHBOARD_VERSION__</strong></p>
    <h1>Trimble GSOF</h1>
    <a class="doc-top-link" href="https://receiverhelp.trimble.com/oem-gnss/gsof-messages-overview.html" target="_blank" rel="noopener noreferrer">Trimble GSOF overview (docs) ↗</a>
    <span id="streamPill" class="pill wait">connecting…</span>
    <div class="meta" id="meta"></div>
    <span id="status"></span>
    <button type="button" id="copyAllRecords" class="header-copy-all" title="Copy every visible GSOF record (tab-separated; each block includes decoded sub-record payload as spaced hex)">Copy all records</button>
  </header>
  <main>
    <div id="cards"></div>
    <section id="warnings">
      <h2>Recent warnings</h2>
      <pre id="warnBody"></pre>
    </section>
  </main>
  <script>
    const cardsEl = document.getElementById("cards");
    const metaEl = document.getElementById("meta");
    const statusEl = document.getElementById("status");
    const streamPill = document.getElementById("streamPill");
    const warningsEl = document.getElementById("warnings");
    const warnBody = document.getElementById("warnBody");
    let lastStreamData = null;
    /** Mirrors server `show_expected_reserved_bits` (gsof-dashboard `-show-expected-reserved-bits`). */
    let gsofShowExpectedReservedBits = false;
    const CLIENT_BUILD = document.documentElement.dataset.gsofBuild || "";

    /** GSOF types 13 / 33 — SV Flags 1 (Trimble all-SV brief / SV brief). */
    const SV_BRIEF_F1_MEANINGS = [
      "Above horizon: 0 = No, 1 = Yes.",
      "Currently assigned to a channel (trying to track): 0 = No, 1 = Yes.",
      "Currently tracked on L1/G1 frequency: 0 = No, 1 = Yes.",
      "Currently tracked on L2/G2 frequency: 0 = No, 1 = Yes.",
      "Reported at base on L1/G1 frequency: 0 = No, 1 = Yes.",
      "Reported at base on L2/G2 frequency: 0 = No, 1 = Yes.",
      "Used in current position: 0 = No, 1 = Yes.",
      "Used in the current RTK solution: 0 = No, 1 = Yes.",
    ];
    /** GSOF type 13 — Flags 2 documented bits; bits 2–7 are not specified in the OEM table used here. */
    const SV_BRIEF_F2_MEANINGS = [
      "Satellite tracking P-code on L1 band: 0 = No, 1 = Yes.",
      "Satellite tracking P-code on L2 band: 0 = No, 1 = Yes.",
      "Reserved / not documented on this page.",
      "Reserved / not documented on this page.",
      "Reserved / not documented on this page.",
      "Reserved / not documented on this page.",
      "Reserved / not documented on this page.",
      "Reserved / not documented on this page.",
    ];

    function setStreamPill(ok, label) {
      streamPill.className = "pill " + (ok ? "ok" : "bad");
      streamPill.textContent = label;
    }

    function subtypeKey(r) {
      return String(r.type);
    }

    /** Attribute value for [data-subtype="…"] (types are numeric; escape " and \\). */
    function attrSel(s) {
      return String(s).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    function cardSelector(key) {
      return 'article.card[data-subtype="' + attrSel(key) + '"]';
    }

    function copyText(text) {
      const t = String(text);
      const legacy = () => {
        const ta = document.createElement("textarea");
        ta.value = t;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(t).catch(legacy);
      }
      legacy();
      return Promise.resolve();
    }

    function appendFieldLinesTSV(prefix, f, lines) {
      lines.push(prefix + f.label + "\t" + f.value);
      if (f.detail && f.detail.length) {
        for (const c of f.detail) {
          appendFieldLinesTSV(prefix + "\t", c, lines);
        }
      }
    }

    function spreadsheetTSVFromRecord(r) {
      const lines = [];
      lines.push(["Message", r.name || ""].join("\t"));
      lines.push(["GSOF type", String(r.type)].join("\t"));
      lines.push(["Type (hex)", r.type_hex || ""].join("\t"));
      lines.push(["Count", String(r.count != null ? r.count : "")].join("\t"));
      lines.push(["Rate", r.rate || ""].join("\t"));
      lines.push(["Stale", r.stale ? "yes" : "no"].join("\t"));
      lines.push(["Doc URL", r.doc_url || ""].join("\t"));
      {
        const ph = typeof r.payload_hex === "string" ? r.payload_hex : "";
        lines.push(["Payload (decoded sub-record)", ph.length ? ph : "(empty)"].join("\t"));
      }
      lines.push(["", ""].join("\t"));
      lines.push(["Field", "Value"].join("\t"));
      if (r.fields && r.fields.length) {
        for (const f of r.fields) {
          appendFieldLinesTSV("", f, lines);
        }
      }
      return lines.join("\n");
    }

    function dlRow(dl, label, fieldKey, value) {
      const dt = document.createElement("dt");
      dt.textContent = label;
      const dd = document.createElement("dd");
      dd.dataset.field = fieldKey;
      dd.textContent = value;
      dl.appendChild(dt);
      dl.appendChild(dd);
    }

    /** Stable key for preserving <details open> across SSE reflows. */
    function fieldRowKey(f, i) {
      if (f.label === "Flags 1") {
        return "flags1";
      }
      if (f.label === "Flags 2") {
        return "flags2";
      }
      if (f.label === "Velocity flags") {
        return "velocityFlags";
      }
      if (f.label === "Clock flags") {
        return "clockFlags";
      }
      if (f.label === "Current time flags") {
        return "timeFlags16";
      }
      if (f.label === "Base flags") {
        return "baseFlags35";
      }
      if (f.label === "Solution flags") {
        return "solutionFlags38";
      }
      if (f.label === "Network flags") {
        return "networkFlags38";
      }
      if (f.label === "Network flags 2") {
        return "networkFlags2_38";
      }
      if (f.label === "Frame flag") {
        return "frameFlag38";
      }
      return "f" + i;
    }

    /** One flag bit row: label and value on the same line (saves vertical space). */
    function appendFlagBitLine(container, f, lineKey) {

    function appendFieldToDL(dl, f, fieldKey) {
      const dt = document.createElement("dt");
      dt.textContent = f.label;

      const dd = document.createElement("dd");
      dd.dataset.field = fieldKey;

      const inner = document.createElement("div");
      inner.className = "field-dd-inner";

      const valEl = document.createElement("span");
      valEl.className = "field-value";
      valEl.textContent = f.value;

      if (f.detail && f.detail.length > 0) {
        const det = document.createElement("details");
        det.className = "field-expand";
        const sum = document.createElement("summary");
        const isFlagField =
          f.label === "Flags 1" ||
          f.label === "Flags 2" ||
          f.label === "Velocity flags" ||
          f.label === "Clock flags" ||
          f.label === "Current time flags" ||
          f.label === "Base flags" ||
          f.label === "Solution flags" ||
          f.label === "Network flags" ||
          f.label === "Network flags 2" ||
          f.label === "Frame flag";
        sum.textContent = isFlagField ? "Flag bit meanings" : "Details";
        const nested = document.createElement(isFlagField ? "div" : "dl");
        nested.className = isFlagField ? "field-nested field-nested-flags" : "field-nested";
        f.detail.forEach((child, j) => {
          if (isFlagField) {
            appendFlagBitLine(nested, child, fieldKey + "-b" + j);
          } else {
            appendFieldToDL(nested, child, fieldKey + "-d" + j);
          }
        });
        det.appendChild(sum);
        det.appendChild(nested);

          const top = document.createElement("div");
          top.className = "field-flags-top";
          top.appendChild(valEl);
          top.appendChild(det);
          inner.appendChild(top);
        } else {
          inner.appendChild(valEl);
          inner.appendChild(det);
        }
      } else {
        inner.appendChild(valEl);
      }

      dd.appendChild(inner);
      dl.appendChild(dt);
      dl.appendChild(dd);

    function fillFields(dl, fields) {
      const openFieldKeys = new Set();
      dl.querySelectorAll("dd[data-field]").forEach((dd) => {
        const det = dd.querySelector("details.field-expand[open]");
        if (det && dd.dataset.field) {
          openFieldKeys.add(dd.dataset.field);
        }
      });

      dl.replaceChildren();
      if (!fields || !fields.length) {
        dlRow(dl, "Decoded fields", "none", "—");
        return;
      }
      fields.forEach((f, i) => {
        const key = fieldRowKey(f, i);
        appendFieldToDL(dl, f, key);
        if (openFieldKeys.has(key)) {
          const dd = dl.querySelector('dd[data-field="' + key + '"]');
          const det = dd && dd.querySelector("details.field-expand");
          if (det) {
            det.open = true;
          }
        }
      });
    }

    function svBriefFmtU8Binary(v) {
      let n = Number(v) & 0xff;
      let s = n.toString(2);
      while (s.length < 8) {
        s = "0" + s;
      }
      return s;
    }

    /** Type 33 Flags 2: bits 5–7 (MSB-left string indices 0–2) shown as · unless reserved-bits mode. */
    function svBriefFmtU8BinaryF2Type33(v, showBits567) {
      const s = svBriefFmtU8Binary(v);
      if (showBits567) {
        return s;
      }
      return "···" + s.slice(3);
    }

    // extraColumns optional: [{ label, value(row) }].
    // extrasBeforeFlags: when true (with extraColumns), numeric columns precede flag bit columns (type 14).
    function satFlagsRenderDetailedGrid(
      container,
      rows,
      firstColLabel,
      firstFieldKey,
      showF2,
      extraColumns,
      extrasBeforeFlags,
      secondColLabel,
      secondFieldKey,
      f2BitCount
    ) {
      const f2Cols =
        typeof f2BitCount === "number" && !isNaN(f2BitCount)
          ? Math.max(0, Math.min(8, f2BitCount | 0))
          : showF2
            ? 2
            : 0;
      const showF2Grid = f2Cols > 0;
      const hasSecondCol = Boolean(secondColLabel && secondFieldKey);
      const isType33F2 = hasSecondCol && f2Cols === 8;
      const isType33F2Lite =
        hasSecondCol &&
        f2Cols === 5 &&
        firstFieldKey === "system_name" &&
        secondFieldKey === "prn";
      const metricsFirst =
        extrasBeforeFlags === true && extraColumns && extraColumns.length > 0;
      const wrap = document.createElement("div");
      wrap.className = "sv-brief-detail-wide-wrap";
      const tbl = document.createElement("table");
      tbl.className = "sv-brief-detail-wide-table";
      let minW = 24 + (hasSecondCol ? 5 : 0) + (showF2Grid ? 2 + f2Cols * 2.2 : 0);
      if (extraColumns && extraColumns.length) {
        minW += extraColumns.length * 5.5;

      tbl.style.minWidth = String(minW) + "rem";

      const cap = document.createElement("caption");
      cap.style.captionSide = "top";
      cap.style.textAlign = "left";
      cap.style.padding = "0 0 0.45rem";

      cap.style.color = "var(--muted)";

        "One row per space vehicle. Under Flags 1 the column titles are bit numbers 0–7. Each cell is Yes if that bit is set, No if clear.";

        capText += " SV system is the first column; PRN is the second.";
      }
      if (showF2Grid) {
        if (isType33F2) {
          capText +=
            " Flags 2 shows bits 0–7; meanings depend on SV system (see legend). Full 8-bit bytes: Basic view.";
        } else if (isType33F2Lite) {
          capText +=
            " Flags 2 shows bits 0–4 only (bits 5–7 reserved). Use -show-expected-reserved-bits for columns 5–7. Basic view masks bits 5–7 in Flags 2.";
        } else {
          capText +=
            " Flags 2 uses columns 0–1 only; bits 2–7 are not columns. Full 8-bit bytes: Basic view.";

      } else {
        capText +=
          " Flags 2 columns are hidden unless gsof-dashboard is run with -show-expected-reserved-bits.";

        capText +=
          " PRN and numeric fields are on the left; per-bit flag columns are on the right.";

        if (showF2Grid) {
          for (let i = 0; i < f2Cols; i++) {

            c.className = "sv-brief-bit-colgroup";
            cg.appendChild(c);
          }

          c.className = "sv-brief-bit-colgroup";

      if (metricsFirst) {

        thF1.textContent = "Flags 1";

          thF2.colSpan = f2Cols;

        if (extraColumns) {

    function renderSVBriefBody(art, r) {

    function copyAllRecordsTSV() {
      const data = lastStreamData;
      if (!data || !data.records || data.records.length === 0) {
        void copyText("(no GSOF records yet)\n");
        return;
      }
      const parts = data.records.map((r) => spreadsheetTSVFromRecord(r));
      void copyText(parts.join("\n\n"));
    }

    function render(data) {
      lastStreamData = data;
      gsofShowExpectedReservedBits = data.show_expected_reserved_bits === true;
      if (data.dashboard_version) {
        const srv = String(data.dashboard_version);
        if (!CLIENT_BUILD || srv !== CLIENT_BUILD) {
          const usp = new URLSearchParams(window.location.search);
          const vq = usp.get("v");
          if (vq === srv) {
            window.location.replace(
              window.location.pathname +
                "?v=" +
                encodeURIComponent(srv) +
                "&_=" +
                String(Date.now()) +
                window.location.hash
            );
          } else {
            window.location.replace(
              window.location.pathname + "?v=" + encodeURIComponent(srv) + window.location.hash
            );
          }
          return;
        }
      }
      metaEl.textContent =
        "mode " + data.mode + " · port " + data.port +
        " · last seq " + data.last_seq + " · " + data.server_time;

      if (data.stream_ok) {
        setStreamPill(true, "stream ok");
      } else {
        setStreamPill(false, "heartbeat timeout");
      }

      const wanted = new Set();
      for (const r of data.records) {
        wanted.add(subtypeKey(r));
      }

      for (const r of data.records) {
        const key = subtypeKey(r);
        let art = cardsEl.querySelector(cardSelector(key));
        if (!art) {
          art = createCard(key);
          cardsEl.appendChild(art);
        }
        updateCard(art, r);
      }

      cardsEl.querySelectorAll("article.card").forEach((art) => {
        if (!wanted.has(art.dataset.subtype)) {
          art.remove();
        }
      });

      for (const r of data.records) {
        const art = cardsEl.querySelector(cardSelector(subtypeKey(r)));
        if (art) {
          cardsEl.appendChild(art);
        }
      }

      if (data.warnings && data.warnings.length) {
        warningsEl.classList.add("visible");
        warnBody.textContent = data.warnings.join("\n");
      } else {
        warningsEl.classList.remove("visible");
        warnBody.textContent = "";
      }
      syncTangentGraphPlotWindow(data);
      syncLLHGraphPlotWindow(data);
      syncDOPGraphPlotWindow(data);
      syncSigmaGraphPlotWindow(data);
      syncAttitudeGraphPlotWindow(data);
    }

    function connect() {
      statusEl.textContent = "Opening SSE…";
      const es = new EventSource("/events");
      es.onopen = () => { statusEl.textContent = "SSE connected"; };
      es.onmessage = (ev) => {
        try {
          const data = JSON.parse(ev.data);
          render(data);
        } catch (e) {
          statusEl.textContent = "Bad JSON: " + e;
        }
      };
      es.onerror = () => {
        statusEl.textContent = "SSE error — retrying…";
        es.close();
        streamPill.className = "pill wait";
        streamPill.textContent = "reconnecting…";
        setTimeout(connect, 2000);
      };
    }
    connect();
    document.getElementById("copyAllRecords").addEventListener("click", () => {
      copyAllRecordsTSV();
    });
