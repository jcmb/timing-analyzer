<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Trimble GSOF · __GSOF_DASHBOARD_VERSION__</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
    }
    .build-banner {
      margin: 0 0 0.5rem;
      padding: 0;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .build-banner span { opacity: 0.85; font-weight: 500; color: var(--muted); }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .meta {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .pill {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: var(--mono);
    }
    .pill.ok { background: rgba(63, 185, 80, 0.15); color: var(--ok); }
    .pill.bad { background: rgba(248, 81, 73, 0.15); color: var(--bad); }
    .pill.wait { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
    #status { font-size: 0.8rem; color: var(--muted); }
    a.doc-top-link {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
    }
    a.doc-top-link:hover { text-decoration: underline; }
    main { padding: 1rem 1.25rem 2rem; max-width: 56rem; margin: 0 auto; }
    #cards {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    article.card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-head {
      padding: 0.75rem 0.9rem 0.65rem;
      border-bottom: 1px solid var(--border);
    }
    /* GSOF human-readable message name — always first / top of card */
    h2.card-title {
      margin: 0 0 0.45rem;
      padding: 0;
      font-size: 1.05rem;
      font-weight: 650;
      color: var(--text);
      line-height: 1.3;
    }
    .card-stats {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.65rem;
    }
    .card-stats .card-rate { color: var(--accent); margin-left: auto; }
    .card-stats .card-stale {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--warn);
      border: 1px solid var(--warn);
      padding: 0.08rem 0.3rem;
      border-radius: 4px;
    }
    .card-stats .card-stale[hidden] { display: none !important; }
    details.card-more {
      border-top: none;
    }
    details.card-more > summary {
      cursor: pointer;
      padding: 0.45rem 0.85rem;
      font-size: 0.78rem;
      color: var(--muted);
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    details.card-more > summary::-webkit-details-marker { display: none; }
    details.card-more > summary::before {
      content: "▸";
      display: inline-block;
      width: 0.85rem;
      color: var(--muted);
      transition: transform 0.15s;
    }
    details.card-more[open] > summary::before {
      transform: rotate(90deg);
    }
    .card-function {
      margin: 0 0 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.35;
    }
    .card-body {
      padding: 0 0.85rem 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 0.55rem;
    }
    .card-body dl {
      margin: 0;
      display: grid;
      grid-template-columns: 8rem 1fr;
      gap: 0.35rem 0.75rem;
    }
    .card-body dt { color: var(--muted); }
    .card-body dd { margin: 0; color: var(--text); font-family: var(--mono); word-break: break-word; }
    .field-dd-inner { display: flex; flex-direction: column; gap: 0.35rem; align-items: flex-start; }
    .field-value { display: block; }
    details.field-expand {
      width: 100%;
      max-width: 100%;
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.45rem;
      background: rgba(0, 0, 0, 0.12);
    }
    details.field-expand > summary {
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--accent);
      list-style: none;
      user-select: none;
      font-family: var(--sans);
    }
    details.field-expand > summary::-webkit-details-marker { display: none; }
    details.field-expand > summary::before {
      content: "▸ ";
      color: var(--muted);
      font-family: var(--mono);
    }
    details.field-expand[open] > summary::before {
      content: "▾ ";
    }
    details.field-expand .field-nested {
      margin: 0.4rem 0 0;
      padding: 0.4rem 0 0;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: minmax(0, 13rem) 1fr;
      gap: 0.3rem 0.65rem;
      font-size: 0.8rem;
    }
    details.field-expand .field-nested dt { color: var(--muted); font-family: var(--sans); }
    details.field-expand .field-nested dd { font-size: 0.78rem; }
    .doc-link-wrap {
      margin: 0.5rem 0 0;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }
    .doc-link {
      color: var(--accent);
      font-size: 0.8rem;
      text-decoration: none;
    }
    .doc-link:hover { text-decoration: underline; }
    #warnings {
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      background: rgba(248, 81, 73, 0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: none;
    }
    #warnings.visible { display: block; }
    #warnings h2 { margin: 0 0 0.5rem; font-size: 0.85rem; color: var(--warn); }
    #warnings pre {
      margin: 0;
      white-space: pre-wrap;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <p class="build-banner" title="Increment cmd/gsof-dashboard/version.go when you change this app">Build <strong>__GSOF_DASHBOARD_VERSION__</strong> <span>— match the version printed at process startup</span></p>
    <h1>Trimble GSOF</h1>
    <a class="doc-top-link" href="https://receiverhelp.trimble.com/oem-gnss/gsof-messages-overview.html" target="_blank" rel="noopener noreferrer">Trimble GSOF overview (docs) ↗</a>
    <span id="streamPill" class="pill wait">connecting…</span>
    <div class="meta" id="meta"></div>
    <span id="status"></span>
  </header>
  <main>
    <div id="cards"></div>
    <section id="warnings">
      <h2>Recent warnings</h2>
      <pre id="warnBody"></pre>
    </section>
  </main>
  <script>
    const cardsEl = document.getElementById("cards");
    const metaEl = document.getElementById("meta");
    const statusEl = document.getElementById("status");
    const streamPill = document.getElementById("streamPill");
    const warningsEl = document.getElementById("warnings");
    const warnBody = document.getElementById("warnBody");

    function setStreamPill(ok, label) {
      streamPill.className = "pill " + (ok ? "ok" : "bad");
      streamPill.textContent = label;
    }

    function subtypeKey(r) {
      return String(r.type);
    }

    /** Attribute value for [data-subtype="…"] (types are numeric; escape " and \\). */
    function attrSel(s) {
      return String(s).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    function cardSelector(key) {
      return 'article.card[data-subtype="' + attrSel(key) + '"]';
    }

    function dlRow(dl, label, fieldKey, value) {
      const dt = document.createElement("dt");
      dt.textContent = label;
      const dd = document.createElement("dd");
      dd.dataset.field = fieldKey;
      dd.textContent = value;
      dl.appendChild(dt);
      dl.appendChild(dd);
    }

    function appendFieldToDL(dl, f, fieldKey) {
      const dt = document.createElement("dt");
      dt.textContent = f.label;
      const dd = document.createElement("dd");
      dd.dataset.field = fieldKey;

      const inner = document.createElement("div");
      inner.className = "field-dd-inner";

      const valEl = document.createElement("span");
      valEl.className = "field-value";
      valEl.textContent = f.value;
      inner.appendChild(valEl);

      if (f.detail && f.detail.length > 0) {
        const det = document.createElement("details");
        det.className = "field-expand";
        const sum = document.createElement("summary");
        sum.textContent =
          f.label === "Flags 1" ? "Flag bit meanings" : "Details";
        const nested = document.createElement("dl");
        nested.className = "field-nested";
        f.detail.forEach((child, j) => {
          appendFieldToDL(nested, child, fieldKey + "-d" + j);
        });
        det.appendChild(sum);
        det.appendChild(nested);
        inner.appendChild(det);
      }

      dd.appendChild(inner);
      dl.appendChild(dt);
      dl.appendChild(dd);
    }

    function fillFields(dl, fields) {
      dl.replaceChildren();
      if (!fields || !fields.length) {
        dlRow(dl, "Decoded fields", "none", "—");
        return;
      }
      fields.forEach((f, i) => {
        appendFieldToDL(dl, f, "f" + i);
      });
    }

    /** Create card once; same <details> node is kept across SSE updates. */
    function createCard(key) {
      const art = document.createElement("article");
      art.className = "card";
      art.dataset.subtype = key;

      const head = document.createElement("header");
      head.className = "card-head";

      const title = document.createElement("h2");
      title.className = "card-title";

      const stats = document.createElement("div");
      stats.className = "card-stats";
      const line = document.createElement("span");
      line.className = "card-line";
      const stale = document.createElement("span");
      stale.className = "card-stale";
      stale.hidden = true;
      const rate = document.createElement("span");
      rate.className = "card-rate";
      stats.appendChild(line);
      stats.appendChild(stale);
      stats.appendChild(rate);

      head.appendChild(title);
      head.appendChild(stats);

      const det = document.createElement("details");
      det.className = "card-more";
      const sum = document.createElement("summary");
      sum.textContent = "Technical details";
      const body = document.createElement("div");
      body.className = "card-body";
      const fn = document.createElement("p");
      fn.className = "card-function";
      const dl = document.createElement("dl");
      const docWrap = document.createElement("p");
      docWrap.className = "doc-link-wrap";
      const docA = document.createElement("a");
      docA.className = "doc-link";
      docA.target = "_blank";
      docA.rel = "noopener noreferrer";
      docA.textContent = "Open Trimble documentation for this message ↗";
      docWrap.appendChild(docA);
      body.appendChild(fn);
      body.appendChild(dl);
      body.appendChild(docWrap);
      det.appendChild(sum);
      det.appendChild(body);

      art.appendChild(head);
      art.appendChild(det);
      return art;
    }

    function updateCard(art, r) {
      art.querySelector("h2.card-title").textContent = r.name;
      art.querySelector(".card-line").textContent =
        "Type " + r.type_hex + " (" + String(r.type) + ")  |  " + String(r.count);
      const stale = art.querySelector(".card-stale");
      stale.hidden = !r.stale;
      if (!stale.hidden) {
        stale.textContent = "stale";
      }
      art.querySelector(".card-rate").textContent = r.rate;

      const body = art.querySelector(".card-body");
      body.querySelector(".card-function").textContent = r.function || "";
      fillFields(body.querySelector("dl"), r.fields);
      const docA = body.querySelector(".doc-link");
      docA.href = r.doc_url || "https://receiverhelp.trimble.com/oem-gnss/gsof-messages-overview.html";
    }

    function render(data) {
      metaEl.textContent =
        "mode " + data.mode + " · port " + data.port +
        " · last seq " + data.last_seq + " · " + data.server_time;

      if (data.stream_ok) {
        setStreamPill(true, "stream ok");
      } else {
        setStreamPill(false, "heartbeat timeout");
      }

      const wanted = new Set();
      for (const r of data.records) {
        wanted.add(subtypeKey(r));
      }

      for (const r of data.records) {
        const key = subtypeKey(r);
        let art = cardsEl.querySelector(cardSelector(key));
        if (!art) {
          art = createCard(key);
          cardsEl.appendChild(art);
        }
        updateCard(art, r);
      }

      cardsEl.querySelectorAll("article.card").forEach((art) => {
        if (!wanted.has(art.dataset.subtype)) {
          art.remove();
        }
      });

      for (const r of data.records) {
        const art = cardsEl.querySelector(cardSelector(subtypeKey(r)));
        if (art) {
          cardsEl.appendChild(art);
        }
      }

      if (data.warnings && data.warnings.length) {
        warningsEl.classList.add("visible");
        warnBody.textContent = data.warnings.join("\n");
      } else {
        warningsEl.classList.remove("visible");
        warnBody.textContent = "";
      }
    }

    function connect() {
      statusEl.textContent = "Opening SSE…";
      const es = new EventSource("/events");
      es.onopen = () => { statusEl.textContent = "SSE connected"; };
      es.onmessage = (ev) => {
        try {
          const data = JSON.parse(ev.data);
          render(data);
        } catch (e) {
          statusEl.textContent = "Bad JSON: " + e;
        }
      };
      es.onerror = () => {
        statusEl.textContent = "SSE error — retrying…";
        es.close();
        streamPill.className = "pill wait";
        streamPill.textContent = "reconnecting…";
        setTimeout(connect, 2000);
      };
    }
    connect();
  </script>
</body>
</html>
