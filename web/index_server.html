<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrimbleTools Jitter Analyzer</title>
    <script src="chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; position: relative;}
        h1 { margin: 0; color: #fff; font-size: 24px; display: inline-block; vertical-align: middle; }

        /* Setup Form Styles */
        #setup-view { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; transition: all 0.2s;}
        input:disabled { background: #1a1a1a; color: #777; border-color: #333; cursor: not-allowed; }

        /* Buttons */
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: background 0.2s;}
        button:hover { background: #45a049; }
        .btn-secondary { width: auto; background: #555; padding: 6px 12px; font-size: 14px; margin-left: 15px; vertical-align: middle; margin-top: 0; }
        .btn-secondary:hover { background: #666; }

        /* Dashboard Styles */
        #dashboard-view { display: none; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .full-width { grid-column: span 2; }
        h2 { margin-top: 0; color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 16px; }

        #connection-status { color: #FFC107; font-weight: bold; cursor: pointer; user-select: none; padding: 8px 12px; border-radius: 4px; background: #222;}

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #333; }
        th { color: #888; text-transform: uppercase; font-size: 12px; }
        .warn-text { color: #FFC107; font-weight: bold; }
        .err-text { color: #F44336; font-weight: bold; }

        #log-container { height: 250px; overflow-y: auto; font-family: monospace; font-size: 13px; background: #000; padding: 10px; border-radius: 4px; }
        .log-row { padding: 4px 0; border-bottom: 1px solid #222; }
        .status-info { color: #4CAF50; }
        .status-warn { color: #FFC107; }
        .status-error { color: #F44336; }
        .timestamp { color: #888; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="setup-view">
        <div class="header" style="text-align: center;">
            <div style="position: absolute; top: 0; right: 0; color: #555; font-size: 12px; font-family: monospace;">{{VERSION}}</div>
            <h1 style="display: block;">GNSS Stream Setup</h1>
            <p style="color:#aaa; font-size:14px; margin-top: 5px;">Connect to a Stream or Caster</p>
        </div>

        <div class="form-group">
            <label>Connection Type</label>
            <select id="connType" onchange="toggleFields()">
                <option value="tcp">Direct TCP</option>
                <option value="ntrip" selected>Standard NTRIP</option>
                <option value="ibss">Trimble IBSS</option>
            </select>
        </div>

        <div class="form-group" id="org-group" style="display: none;">
            <label>Organization (Org)</label>
            <input type="text" id="org" placeholder="e.g. MyOrg" onkeyup="updateIBSSHost()">
        </div>

        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 2;">
                <label>Host / IP Address</label>
                <input type="text" id="host" placeholder="e.g. sps855.com or 192.168.1.50">
            </div>
            <div style="flex: 1;">
                <label>Port</label>
                <input type="number" id="port" value="2101">
            </div>
        </div>

        <div class="form-group" id="mount-group">
            <label>NTRIP Mountpoint</label>
            <input type="text" id="mountpoint" placeholder="e.g. RTK-BASE">
        </div>

        <div class="form-group" id="auth-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label id="username-label">Username</label>
                <input type="text" id="username">
            </div>
            <div style="flex: 1;">
                <label>Password</label>
                <input type="password" id="password">
            </div>
        </div>

        <div class="form-group" style="display: flex; gap: 10px; margin-top: 25px; border-top: 1px solid #333; padding-top: 15px;">
            <div style="flex: 1;">
                <label>Expected Rate (Hz)</label>
                <input type="number" id="rate" value="1.0" step="0.1">
            </div>
            <div style="flex: 1;">
                <label>Allowed Jitter</label>
                <input type="text" id="jitter" value="10%">
            </div>
        </div>
        <div class="form-group">
            <label>Payload Decoder</label>
            <select id="decode">
                <option value="none">None (Raw Rate Timing)</option>
                <option value="dcol" selected>Trimble DCOL</option>
                <option value="mb-cmr">Moving Baseline (MB-CMR)</option>
            </select>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label style="display: flex; align-items: center; cursor: pointer; color: #fff;">
                <input type="checkbox" id="verbose" style="width: auto; margin-right: 10px;">
                Enable Verbose Telemetry (Detailed Event Log)
            </label>
        </div>

        <button onclick="startSession()">Connect & Analyze</button>
        <div id="setup-error" style="color: #F44336; margin-top: 10px; text-align: center; display: none;"></div>
    </div>

    <div id="dashboard-view">
        <div class="dash-header header">
            <div>
                <h1>Live Telemetry</h1>
                <button class="btn-secondary" onclick="stopSession()">&#9632; Stop & New Setup</button>
                <div id="target-label" style="color:#aaa; font-size:14px; margin-top:8px;"></div>
            </div>
            <div id="connection-status" title="Click to Pause/Resume">Connecting...</div>
            <div style="position: absolute; top: 0; right: 0; color: #555; font-size: 12px; font-family: monospace;">{{VERSION}}</div>
        </div>

        <div class="grid">
            <div class="card full-width">
                <h2>Live Jitter (Delta ms)</h2>
                <canvas id="jitterChart" height="60"></canvas>
            </div>

            <div class="card full-width">
                <h2>Stream Statistics</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Stream Type</th>
                            <th>Packets</th>
                            <th>Violations</th>
                            <th>Missed</th>
                            <th>Latest Δ</th>
                            <th>Min/Max Δ</th>
                            <th>Expected</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body"></tbody>
                </table>
            </div>

            <div class="card full-width">
                <h2>Live Event Log</h2>
                <div id="log-container"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Form Interaction Logic ---
        window.onload = () => toggleFields();

        function toggleFields() {
            const mode = document.getElementById('connType').value;
            const hostInput = document.getElementById('host');
            const portInput = document.getElementById('port');
            const orgGroup = document.getElementById('org-group');
            const mountGroup = document.getElementById('mount-group');
            const authGroup = document.getElementById('auth-group');
            const userLabel = document.getElementById('username-label');

            if (mode === 'tcp') {
                hostInput.disabled = false;
                portInput.disabled = false;
                orgGroup.style.display = 'none';
                mountGroup.style.display = 'none';
                authGroup.style.display = 'none';
                hostInput.value = hostInput.getAttribute('data-last') || '';
                portInput.value = portInput.getAttribute('data-last-port') || '2101';

            } else if (mode === 'ntrip') {
                hostInput.disabled = false;
                portInput.disabled = false;
                orgGroup.style.display = 'none';
                mountGroup.style.display = 'block';
                authGroup.style.display = 'flex';
                userLabel.textContent = 'Username';
                hostInput.value = hostInput.getAttribute('data-last') || '';
                portInput.value = portInput.getAttribute('data-last-port') || '2101';

            } else if (mode === 'ibss') {
                if (!hostInput.disabled) {
                    hostInput.setAttribute('data-last', hostInput.value);
                    portInput.setAttribute('data-last-port', portInput.value);
                }
                hostInput.disabled = true;
                portInput.disabled = true;
                portInput.value = "2101";

                orgGroup.style.display = 'block';
                mountGroup.style.display = 'block';
                authGroup.style.display = 'flex';
                userLabel.textContent = 'Device Name';
                updateIBSSHost();
            }
        }

        function updateIBSSHost() {
            if (document.getElementById('connType').value === 'ibss') {
                const org = document.getElementById('org').value.trim() || '<org>';
                document.getElementById('host').value = `${org}.ibss.trimbleos.com`;
            }
        }

        // --- Session Connection Logic ---
        let evtSource = null;
        let isPaused = false;
        let isConnected = false;
        let proxyCheckTimer = null;

        async function startSession() {
            const mode = document.getElementById('connType').value;

            const payload = {
                mode: mode,
                rate: parseFloat(document.getElementById('rate').value),
                jitter: document.getElementById('jitter').value,
                decode: document.getElementById('decode').value,
                verbose: document.getElementById('verbose').checked
            };

            if (mode === 'ibss') {
                const org = document.getElementById('org').value.trim();
                const device = document.getElementById('username').value.trim();

                if (!org || !device) {
                    showError("Organization and Device Name are required for IBSS.");
                    return;
                }

                payload.host = `${org}.ibss.trimbleos.com`;
                payload.port = 2101;
                payload.mountpoint = document.getElementById('mountpoint').value.trim();
                payload.username = `${device}.${org}`;
                payload.password = document.getElementById('password').value;

                if (!payload.mountpoint) {
                    showError("Mountpoint is required for IBSS connections.");
                    return;
                }

            } else {
                payload.host = document.getElementById('host').value;
                payload.port = parseInt(document.getElementById('port').value);

                if (!payload.host || !payload.port) {
                    showError("Host and Port are required.");
                    return;
                }

                if (mode === 'ntrip') {
                    payload.mountpoint = document.getElementById('mountpoint').value.trim();
                    payload.username = document.getElementById('username').value;
                    payload.password = document.getElementById('password').value;

                    if (!payload.mountpoint) {
                        showError("Mountpoint is required for standard NTRIP connections.");
                        return;
                    }
                } else {
                    payload.mountpoint = "";
                    payload.username = "";
                    payload.password = "";
                }
            }

            document.getElementById('setup-error').style.display = 'none';

            let basePath = window.location.pathname;
            if (!basePath.endsWith('/')) basePath += '/';

            try {
                const response = await fetch(basePath + 'api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error || "Failed to start session");

                document.getElementById('setup-view').style.display = 'none';
                document.getElementById('dashboard-view').style.display = 'block';

                document.getElementById('target-label').textContent = `Target: ${payload.host}:${payload.port}${payload.mountpoint ? '/'+payload.mountpoint : ''}`;

                connectSSE(result.session_id);

            } catch (err) {
                showError(err.message);
            }
        }

        function stopSession() {
            if (proxyCheckTimer) {
                clearTimeout(proxyCheckTimer);
                proxyCheckTimer = null;
            }

            if (evtSource) {
                evtSource.close();
                evtSource = null;
            }
            isConnected = false;
            isPaused = false;

            for (let member in statsMap) delete statsMap[member];
            colorIdx = 0;

            jitterChart.data.labels = [];
            jitterChart.data.datasets = [];
            jitterChart.update();

            document.getElementById('stats-body').innerHTML = '';
            document.getElementById('log-container').innerHTML = '';

            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('setup-view').style.display = 'block';
        }

        function showError(msg) {
            const errDiv = document.getElementById('setup-error');
            errDiv.innerHTML = msg;
            errDiv.style.display = 'block';
        }

        // --- Live Charting & Telemetry Logic ---
        const commonChartOptions = {
            responsive: true,
            animation: false,
            scales: { x: { display: false }, y: { grid: { color: '#333' } } },
            plugins: { legend: { labels: { color: '#e0e0e0' } } }
        };

        const ctxJitter = document.getElementById('jitterChart').getContext('2d');
        const jitterChart = new Chart(ctxJitter, {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: { ...commonChartOptions, scales: { ...commonChartOptions.scales, y: { title: { display: true, text: 'Delta (ms)', color: '#888' }, grid: { color: '#333' } } } }
        });

        const colors = ['#4CAF50', '#2196F3', '#FF9800', '#E91E63', '#9C27B0', '#00BCD4'];
        let colorIdx = 0;
        const maxDataPoints = 100;
        const statsMap = {};

        function getOrCreateDataset(chartObj, labelName) {
            let dataset = chartObj.data.datasets.find(d => d.label === labelName);
            if (!dataset) {
                dataset = { label: labelName, data: [], borderColor: colors[colorIdx % colors.length], borderWidth: 2, fill: false, tension: 0.1, pointRadius: 2 };
                chartObj.data.datasets.push(dataset);
                colorIdx++;
            }
            return dataset;
        }

        const statusDiv = document.getElementById('connection-status');
        statusDiv.addEventListener('click', () => {
            if (!isConnected) return;
            isPaused = !isPaused;
            if (isPaused) {
                statusDiv.innerHTML = "Paused &#10074;&#10074;";
                statusDiv.style.color = "#FF9800";
            } else {
                statusDiv.textContent = "Live \u25CF";
                statusDiv.style.color = "#4CAF50";
            }
        });

        function connectSSE(sessionId) {
            let basePath = window.location.pathname;
            if (!basePath.endsWith('/')) basePath += '/';

            // NETSKOPE DETECTION: Start the countdown IMMEDIATELY.
            proxyCheckTimer = setTimeout(() => {
                const altUrl = "http://" + window.location.hostname + ":2102/jitter";
                showError(`⚠️ Stream blocked! A corporate proxy (like Netskope) is intercepting the live stream. Please disable it or access the tool directly via: <br><a href="${altUrl}" style="color:#4CAF50; text-decoration:underline;">${altUrl}</a>`);
                stopSession();
            }, 6000);

            evtSource = new EventSource(`${basePath}events?session_id=${sessionId}`);

            evtSource.onopen = () => {
                isConnected = true;
                if (!isPaused) {
                    statusDiv.textContent = "Live \u25CF";
                    statusDiv.style.color = "#4CAF50";
                }
            };

            evtSource.onerror = () => {
                if (proxyCheckTimer) {
                    clearTimeout(proxyCheckTimer);
                    proxyCheckTimer = null;
                }

                isConnected = false;
                statusDiv.textContent = "Disconnected \u25CF";
                statusDiv.style.color = "#F44336";
            };

            evtSource.onmessage = (event) => {
                if (isPaused) return;

                // If data arrives, kill the Netskope warning timer
                if (proxyCheckTimer) {
                    clearTimeout(proxyCheckTimer);
                    proxyCheckTimer = null;
                }

                const data = JSON.parse(event.data);

                if (data.status === 'fatal') {
                    showError(data.message);
                    stopSession();
                    return;
                }

                if (!statsMap[data.display_key]) {
                    statsMap[data.display_key] = { count: 0, violations: 0, missed: 0, latest_delta: 0, min_delta: null, max_delta: null, expected_ms: data.expected_ms, last_plotted_count: 0 };
                }
                const s = statsMap[data.display_key];
                s.count = data.count;

                if (data.actual_delta_ms > 0) {
                    s.latest_delta = data.actual_delta_ms;
                    if (s.min_delta === null || data.actual_delta_ms < s.min_delta) s.min_delta = data.actual_delta_ms;
                    if (s.max_delta === null || data.actual_delta_ms > s.max_delta) s.max_delta = data.actual_delta_ms;
                }

                if (data.status === 'warn') s.violations++;
                if (data.status === 'error') s.missed++;

                if (data.actual_delta_ms > 0 && s.last_plotted_count !== data.count) {
                    s.last_plotted_count = data.count;

                    const jDataset = getOrCreateDataset(jitterChart, data.display_key);
                    jitterChart.data.labels.push(data.timestamp);
                    jDataset.data.push(data.actual_delta_ms);

                    if (jitterChart.data.labels.length > maxDataPoints) {
                        jitterChart.data.labels.shift();
                        jitterChart.data.datasets.forEach(d => d.data.length > maxDataPoints ? d.data.shift() : null);
                    }
                    jitterChart.update();
                }

                const tbody = document.getElementById('stats-body');
                tbody.innerHTML = '';
                for (const key in statsMap) {
                    const rowStats = statsMap[key];
                    const deltaStr = rowStats.latest_delta > 0 ? rowStats.latest_delta : '---';
                    const minMaxStr = rowStats.min_delta !== null ? `${rowStats.min_delta} / ${rowStats.max_delta}` : '---';

                    const row = `<tr>
                        <td style="font-weight: bold; color: #fff;">${key}</td>
                        <td>${rowStats.count}</td>
                        <td class="${rowStats.violations > 0 ? 'warn-text' : ''}">${rowStats.violations}</td>
                        <td class="${rowStats.missed > 0 ? 'err-text' : ''}">${rowStats.missed}</td>
                        <td>${deltaStr}</td>
                        <td style="color: #aaa;">${minMaxStr}</td>
                        <td>${rowStats.expected_ms}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                }

                const logContainer = document.getElementById('log-container');
                const logRow = document.createElement('div');
                logRow.className = `log-row status-${data.status}`;
                logRow.innerHTML = `<span class="timestamp">${data.timestamp}</span> <strong>[${data.display_key.padEnd(12)}]</strong> Count: ${data.count} | Delta: ${data.actual_delta_ms > 0 ? data.actual_delta_ms : '---'} | Exp: ${data.expected_ms} | ${data.message}`;

                logContainer.appendChild(logRow);
                if (logContainer.childElementCount > 100) {
                    logContainer.removeChild(logContainer.firstChild);
                }
                logContainer.scrollTop = logContainer.scrollHeight;
            };
        }
    </script>
</body>
</html>
